# Site settings
title: 我的博客
SEOTitle: 彩云的博客
header-img: img/post-bg-universe.jpg
email: cui_caiyun@qq.com
description: "记录学习、思考与专业输出"
keyword: "博客, 技术, 思考, 学习笔记"
url: "https://cy-cui.github.io"
baseurl: ""

timezone: Asia/Shanghai
future: true
lang: zh-CN

# SNS settings
RSS: true
github_username: cy-cui

# Build settings
highlighter: rouge
permalink: pretty
paginate: 10
paginate_path: "/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-feed

exclude:
  - Gemfile.lock
  - "*.gem"
  - "*.gemspec"
  - less
  - node_modules
  - README.md
  - AGENTS.md
  - WRITING.md
  - bin
  - .hux-ref
  - .git
  - .github

anchorjs: true

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Comments (Giscus) — fill in after creating GitHub Discussions
giscus:
  enabled: false
  repo: cy-cui/cy-cui.github.io
  repo_id: ""
  category: "Announcements"
  category_id: ""
  mapping: pathname
  reactions_enabled: true
  emit_metadata: false
  input_position: bottom
  theme: preferred_color_scheme
  lang: zh-CN

# Analytics (optional — leave ga_track_id unset to disable)
# ga_track_id: "G-XXXXXXXX"
# ga_domain: cy-cui.github.io

# Sidebar settings
sidebar: true
sidebar-about-description: "记录学习、思考与专业输出"
sidebar-avatar: https://github.com/cy-cui.png

# Featured Tags
featured-tags: true
featured-condition-size: 0

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: false

# Friends (optional)
friends: []
