---
layout: home
title: 首页
---

<div class="home-intro">
  <h1>欢迎来到彩云的博客</h1>
  <p>记录学习与生活</p>
</div>

<div class="home-posts">
  <h2>最新文章</h2>
  <ul class="post-list">
  {% for post in site.posts limit:5 %}
    <li>
      <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
      <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
  </ul>
</div>
